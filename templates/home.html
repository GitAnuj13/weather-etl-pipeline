<!DOCTYPE html>
<html>
<head>
    <title>Weather ETL Dashboard</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:0;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:30px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 2px 8px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        a{
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:10px 20px;
            border-radius:5px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="card">

        <h1>Weather ETL Dashboard</h1>

        <p>
            Weather data extracted from API,
            transformed using Python,
            loaded into SQL Server,
            and displayed using Flask.
        </p>

        <br>

        <a href="/weather">
            View Weather Data
        </a>

    </div>

</div>

</body>
</html>
